name: db-migrate

# Lint migrations on every PR. Apply migrations on master push (gated by env).
#
# Required repo secrets:
#   SUPABASE_ACCESS_TOKEN  — personal access token (Supabase dashboard).
#   SUPABASE_DB_PASSWORD   — DB password for `db push`.
#   SUPABASE_PROJECT_REF   — project ref id (xxxxxxxx).

on:
  push:
    branches: [master]
    paths: ["supabase/migrations/**"]
  pull_request:
    paths: ["supabase/migrations/**"]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Validate migrations syntax
        run: |
          # `supabase db start` boots local Postgres and applies every
          # migration in supabase/migrations/ on boot. Any SQL error fails
          # the step. Skip `db reset` because it tries to apply seed.sql
          # which requires linking, and we have no seed-time dependency.
          supabase db start
          supabase db stop

  apply:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: lint
    runs-on: ubuntu-latest
    environment:
      # GitHub environment `Production` (Repo → Settings → Environments) has
      # required reviewers configured. Job pauses for manual approval before
      # touching the live Supabase project.
      name: Production
    steps:
      - uses: actions/checkout@v6
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Link production project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
      - name: Push migrations to production
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push --include-all
