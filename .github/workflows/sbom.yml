name: sbom-and-deps

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: true

  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      # CycloneDX JSON SBOM, ignora devDeps em produção.
      - name: Generate SBOM (CycloneDX)
        run: npx --yes @cyclonedx/cyclonedx-npm@latest --output-format JSON --output-file sbom.cdx.json --omit dev
      - uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.cdx.json
          retention-days: 90
