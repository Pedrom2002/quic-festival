name: bundle-budget

# Builds the app and asserts each route stays within its size budget.
# Runs on PRs that touch frontend code, plus weekly to catch dep upgrades
# silently bloating the bundle.

on:
  pull_request:
    paths:
      - "src/**"
      - "package*.json"
      - "next.config.ts"
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
          SUPABASE_SERVICE_ROLE_KEY: test-service-key
          RESEND_API_KEY: re_test_key
          NEXT_PUBLIC_SITE_URL: https://quic.pt
        run: npm run build
      - name: Check bundle budget
        run: npm run bundle:check
